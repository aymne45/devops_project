<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Accès Refusé - ENT</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-teal-400 via-cyan-400 to-blue-500 flex items-center justify-center min-h-screen p-4">

<div class="bg-white/90 backdrop-blur-md p-10 rounded-3xl shadow-2xl w-full max-w-md text-center">
    
    <div class="mb-6">
        <div class="w-20 h-20 bg-red-100 rounded-full flex items-center justify-center mx-auto mb-4">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 text-red-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
            </svg>
        </div>
        <h2 class="text-2xl font-bold text-gray-800 mb-3">Accès Restreint</h2>
    </div>

    <div class="bg-yellow-50 border-2 border-yellow-200 rounded-xl p-6 mb-6">
        <p class="text-gray-700 mb-4">
            La création de compte est désormais réservée aux administrateurs de l'ENT.
        </p>
        <p class="text-sm text-gray-600">
            Pour obtenir un compte, veuillez contacter l'administration de votre établissement.
        </p>
    </div>

    <a href="../login/" class="inline-block w-full bg-gradient-to-r from-green-600 to-blue-600 text-white font-bold py-3.5 rounded-xl 
               hover:from-green-700 hover:to-blue-700 transform hover:scale-[1.02] transition duration-200 shadow-lg">
        Retour à la connexion
    </a>
</div>

<script>
    // Redirection automatique après 5 secondes
    setTimeout(() => {
        window.location.href = '../login/';
    }, 5000);
</script>

</body>
</html>

<!-- Background decoration -->
<div class="absolute inset-0 bg-black opacity-10 backdrop-blur-3xl"></div>
<div class="absolute top-0 left-0 w-40 h-40 bg-white rounded-full filter blur-3xl opacity-20 animate-pulse"></div>
<div class="absolute bottom-0 right-0 w-60 h-60 bg-yellow-300 rounded-full filter blur-3xl opacity-20 animate-pulse"></div>

<!-- Main Card -->
<div class="bg-white/90 backdrop-blur-md p-10 rounded-3xl shadow-2xl w-full max-w-md relative z-10 border border-white/20">

    <!-- Logo -->
    <div class="flex justify-center mb-6">
        <div class="hover:scale-110 transition duration-500 cursor-pointer">
            <img src="../img/logo.png" alt="ENT Logo" class="w-35 h-25 object-contain">
        </div>
    </div>

    <h2 class="text-2xl font-bold text-gray-800 text-center mb-6">Créer un compte</h2>

    <!-- Username Input -->
    <div class="mb-4">
        <label class="block text-sm font-medium text-gray-700 mb-2 ml-1">Nom d'utilisateur</label>
        <div class="relative group">
            <span class="absolute inset-y-0 left-0 flex items-center pl-4 text-gray-500 group-focus-within:text-indigo-500 transition duration-200">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor" class="w-5 h-5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0A17.933 17.933 0 0112 21.75c-2.676 0-5.216-.584-7.499-1.632z" />
                </svg>
            </span>
            <input id="username" type="text" placeholder="Nom d'utilisateur"
                class="w-full pl-12 pr-4 py-3 bg-gray-50 border-2 border-gray-200 rounded-xl 
                       focus:outline-none focus:border-indigo-500 focus:bg-white 
                       transition duration-200 text-gray-700 placeholder-gray-400">
        </div>
    </div>

    <!-- Full Name Input -->
    <div class="mb-4">
        <label class="block text-sm font-medium text-gray-700 mb-2 ml-1">Nom complet</label>
        <div class="relative group">
            <span class="absolute inset-y-0 left-0 flex items-center pl-4 text-gray-500 group-focus-within:text-indigo-500 transition duration-200">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor" class="w-5 h-5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M17.982 18.725A7.488 7.488 0 0012 15.75a7.488 7.488 0 00-5.982 2.975m11.963 0a9 9 0 10-11.963 0m11.963 0A8.966 8.966 0 0112 21a8.966 8.966 0 01-5.982-2.275M15 9.75a3 3 0 11-6 0 3 3 0 016 0z" />
                </svg>
            </span>
            <input id="fullname" type="text" placeholder="Prénom et nom"
                class="w-full pl-12 pr-4 py-3 bg-gray-50 border-2 border-gray-200 rounded-xl 
                       focus:outline-none focus:border-indigo-500 focus:bg-white 
                       transition duration-200 text-gray-700 placeholder-gray-400">
        </div>
    </div>

    <!-- Email Input -->
    <div class="mb-4">
        <label class="block text-sm font-medium text-gray-700 mb-2 ml-1">Email</label>
        <div class="relative group">
            <span class="absolute inset-y-0 left-0 flex items-center pl-4 text-gray-500 group-focus-within:text-indigo-500 transition duration-200">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor" class="w-5 h-5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M21.75 6.75v10.5a2.25 2.25 0 01-2.25 2.25h-15a2.25 2.25 0 01-2.25-2.25V6.75m19.5 0A2.25 2.25 0 0019.5 4.5h-15a2.25 2.25 0 00-2.25 2.25m19.5 0v.243a2.25 2.25 0 01-1.07 1.916l-7.5 4.615a2.25 2.25 0 01-2.36 0L3.32 8.91a2.25 2.25 0 01-1.07-1.916V6.75" />
                </svg>
            </span>
            <input id="email" type="email" placeholder="votre-email@exemple.com"
                class="w-full pl-12 pr-4 py-3 bg-gray-50 border-2 border-gray-200 rounded-xl 
                       focus:outline-none focus:border-indigo-500 focus:bg-white 
                       transition duration-200 text-gray-700 placeholder-gray-400">
        </div>
    </div>

    <!-- Role Selection -->
    <div class="mb-4">
        <label class="block text-sm font-medium text-gray-700 mb-2 ml-1">Type de compte</label>
        <div class="relative group">
            <span class="absolute inset-y-0 left-0 flex items-center pl-4 text-gray-500 group-focus-within:text-indigo-500 transition duration-200 pointer-events-none">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor" class="w-5 h-5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M9 12h3.75M9 15h3.75M9 18h3.75m3 .75H18a2.25 2.25 0 002.25-2.25V6.108c0-1.135-.845-2.098-1.976-2.192a48.424 48.424 0 00-1.123-.08m-5.801 0c-.065.21-.1.433-.1.664 0 .414.336.75.75.75h4.5a.75.75 0 00.75-.75 2.25 2.25 0 00-.1-.664m-5.8 0A2.251 2.251 0 0113.5 2.25H15c1.012 0 1.867.668 2.15 1.586m-5.8 0c-.376.023-.75.05-1.124.08C9.095 4.01 8.25 4.973 8.25 6.108V8.25m0 0H4.875c-.621 0-1.125.504-1.125 1.125v11.25c0 .621.504 1.125 1.125 1.125h9.75c.621 0 1.125-.504 1.125-1.125V9.375c0-.621-.504-1.125-1.125-1.125H8.25zM6.75 12h.008v.008H6.75V12zm0 3h.008v.008H6.75V15zm0 3h.008v.008H6.75V18z" />
                </svg>
            </span>
            <select id="role"
                class="w-full pl-12 pr-4 py-3 bg-gray-50 border-2 border-gray-200 rounded-xl 
                       focus:outline-none focus:border-indigo-500 focus:bg-white 
                       transition duration-200 text-gray-700 appearance-none cursor-pointer">
                <option value="student">Étudiant</option>
                <option value="teacher">Enseignant</option>
            </select>
            <span class="absolute inset-y-0 right-0 flex items-center pr-4 text-gray-500 pointer-events-none">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor" class="w-5 h-5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 8.25l-7.5 7.5-7.5-7.5" />
                </svg>
            </span>
        </div>
    </div>

    <!-- Password Input -->
    <div class="mb-4">
        <label class="block text-sm font-medium text-gray-700 mb-2 ml-1">Mot de passe</label>
        <div class="relative group">
            <span class="absolute inset-y-0 left-0 flex items-center pl-4 text-gray-500 group-focus-within:text-indigo-500 transition duration-200">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor" class="w-5 h-5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M16.5 10.5V6.75a4.5 4.5 0 10-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 002.25-2.25v-6.75a2.25 2.25 0 00-2.25-2.25H6.75a2.25 2.25 0 00-2.25 2.25v6.75a2.25 2.25 0 002.25 2.25z" />
                </svg>
            </span>
            <input id="password" type="password" placeholder="••••••••"
                class="w-full pl-12 pr-12 py-3 bg-gray-50 border-2 border-gray-200 rounded-xl 
                       focus:outline-none focus:border-indigo-500 focus:bg-white
                       transition duration-200 text-gray-700 placeholder-gray-400">
            <button type="button" id="togglePassword" 
                class="absolute inset-y-0 right-0 flex items-center pr-4 text-gray-500 hover:text-indigo-600 transition duration-200">
                <svg id="eyeIcon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor" class="w-5 h-5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z" />
                    <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                </svg>
                <svg id="eyeSlashIcon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor" class="w-5 h-5 hidden">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M3.98 8.223A10.477 10.477 0 001.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.45 10.45 0 0112 4.5c4.756 0 8.773 3.162 10.065 7.498a10.523 10.523 0 01-4.293 5.774M6.228 6.228L3 3m3.228 3.228l3.65 3.65m7.894 7.894L21 21m-3.228-3.228l-3.65-3.65m0 0a3 3 0 10-4.243-4.243m4.242 4.242L9.88 9.88" />
                </svg>
            </button>
        </div>
    </div>

    <!-- Confirm Password Input -->
    <div class="mb-5">
        <label class="block text-sm font-medium text-gray-700 mb-2 ml-1">Confirmer le mot de passe</label>
        <div class="relative group">
            <span class="absolute inset-y-0 left-0 flex items-center pl-4 text-gray-500 group-focus-within:text-indigo-500 transition duration-200">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor" class="w-5 h-5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>
            </span>
            <input id="confirmPassword" type="password" placeholder="••••••••"
                class="w-full pl-12 pr-12 py-3 bg-gray-50 border-2 border-gray-200 rounded-xl 
                       focus:outline-none focus:border-indigo-500 focus:bg-white
                       transition duration-200 text-gray-700 placeholder-gray-400">
            <button type="button" id="toggleConfirmPassword" 
                class="absolute inset-y-0 right-0 flex items-center pr-4 text-gray-500 hover:text-indigo-600 transition duration-200">
                <svg id="eyeIcon2" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor" class="w-5 h-5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z" />
                    <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                </svg>
                <svg id="eyeSlashIcon2" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor" class="w-5 h-5 hidden">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M3.98 8.223A10.477 10.477 0 001.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.45 10.45 0 0112 4.5c4.756 0 8.773 3.162 10.065 7.498a10.523 10.523 0 01-4.293 5.774M6.228 6.228L3 3m3.228 3.228l3.65 3.65m7.894 7.894L21 21m-3.228-3.228l-3.65-3.65m0 0a3 3 0 10-4.243-4.243m4.242 4.242L9.88 9.88" />
                </svg>
            </button>
        </div>
    </div>

    <!-- Error/Success Message -->
    <div id="message" class="mb-4 hidden"></div>

    <!-- Register Button -->
    <button id="register-btn"
        class="w-full bg-gradient-to-r from-green-600 to-blue-600 text-white font-bold py-3.5 rounded-xl 
               hover:from-green-700 hover:to-blue-700 active:from-green-800 active:to-blue-800
               transform hover:scale-[1.02] transition duration-200 shadow-lg shadow-green-600/30">
        Créer mon compte
    </button>

    <!-- Loader -->
    <div id="loader" class="hidden mt-4 text-center">
        <div class="inline-block animate-spin rounded-full h-8 w-8 border-b-2 border-indigo-600"></div>
    </div>

    <!-- Login link -->
    <p class="text-center mt-6 text-sm text-gray-600">
        Vous avez déjà un compte? 
        <a href="../login/" class="font-semibold text-indigo-600 hover:text-indigo-800 transition duration-200">
            Se connecter
        </a>
    </p>

</div>

<script>
    // Toggle password visibility
    const togglePassword = document.getElementById('togglePassword');
    const passwordInput = document.getElementById('password');
    const eyeIcon = document.getElementById('eyeIcon');
    const eyeSlashIcon = document.getElementById('eyeSlashIcon');

    togglePassword.addEventListener('click', function() {
        const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
        passwordInput.setAttribute('type', type);
        eyeIcon.classList.toggle('hidden');
        eyeSlashIcon.classList.toggle('hidden');
    });

    // Toggle confirm password visibility
    const toggleConfirmPassword = document.getElementById('toggleConfirmPassword');
    const confirmPasswordInput = document.getElementById('confirmPassword');
    const eyeIcon2 = document.getElementById('eyeIcon2');
    const eyeSlashIcon2 = document.getElementById('eyeSlashIcon2');

    toggleConfirmPassword.addEventListener('click', function() {
        const type = confirmPasswordInput.getAttribute('type') === 'password' ? 'text' : 'password';
        confirmPasswordInput.setAttribute('type', type);
        eyeIcon2.classList.toggle('hidden');
        eyeSlashIcon2.classList.toggle('hidden');
    });

    // Registration functionality
    const registerBtn = document.getElementById('register-btn');
    const usernameInput = document.getElementById('username');
    const fullnameInput = document.getElementById('fullname');
    const emailInput = document.getElementById('email');
    const roleInput = document.getElementById('role');
    const messageDiv = document.getElementById('message');
    const loader = document.getElementById('loader');

    function showMessage(text, isError = false) {
        messageDiv.textContent = text;
        messageDiv.className = `mb-4 p-3 rounded-lg text-sm ${
            isError 
                ? 'bg-red-100 text-red-700 border border-red-200' 
                : 'bg-green-100 text-green-700 border border-green-200'
        }`;
        messageDiv.classList.remove('hidden');
        setTimeout(() => {
            messageDiv.classList.add('hidden');
        }, 5000);
    }

    registerBtn.addEventListener('click', async function(e) {
        e.preventDefault();
        
        const username = usernameInput.value.trim();
        const fullname = fullnameInput.value.trim();
        const email = emailInput.value.trim();
        const password = passwordInput.value;
        const confirmPassword = confirmPasswordInput.value;
        const role = roleInput.value;

        // Validation
        if (!username || !fullname || !email || !password || !confirmPassword) {
            showMessage('Veuillez remplir tous les champs', true);
            return;
        }

        // Email validation
        const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        if (!emailRegex.test(email)) {
            showMessage('Veuillez entrer une adresse email valide', true);
            return;
        }

        // Password validation
        if (password.length < 6) {
            showMessage('Le mot de passe doit contenir au moins 6 caractères', true);
            return;
        }

        if (password !== confirmPassword) {
            showMessage('Les mots de passe ne correspondent pas', true);
            return;
        }

        // Show loader
        registerBtn.disabled = true;
        registerBtn.textContent = 'Création en cours...';
        loader.classList.remove('hidden');

        try {
            const response = await fetch('http://localhost:8001/register', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    username: username,
                    email: email,
                    password: password,
                    full_name: fullname,
                    role: role
                })
            });

            const data = await response.json();

            if (response.ok) {
                showMessage('✓ Compte créé avec succès ! Redirection...', false);
                
                // Clear form
                usernameInput.value = '';
                fullnameInput.value = '';
                emailInput.value = '';
                passwordInput.value = '';
                confirmPasswordInput.value = '';
                
                // Redirect to login page after 2 seconds
                setTimeout(() => {
                    window.location.href = '../login/';
                }, 2000);
            } else {
                if (data.detail && data.detail.includes('already registered')) {
                    showMessage('Ce nom d\'utilisateur existe déjà', true);
                } else {
                    showMessage(data.detail || 'Erreur lors de la création du compte', true);
                }
            }
        } catch (error) {
            showMessage('Erreur de connexion au serveur', true);
            console.error('Error:', error);
        } finally {
            registerBtn.disabled = false;
            registerBtn.textContent = 'Créer mon compte';
            loader.classList.add('hidden');
        }
    });

    // Enable Enter key submission
    document.addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
            registerBtn.click();
        }
    });
</script>

</body>
</html>
