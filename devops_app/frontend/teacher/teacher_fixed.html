<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ENT EST · Espace Enseignant</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="../js/api.js"></script>
    <script src="../js/notifications.js"></script>
    <script src="teacher-data.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #f9fafb; margin: 0; overflow-x: hidden; }
        .content-area { margin-left: 256px; padding-top: 64px; min-height: 100vh; transition: all 0.3s ease; }
        .nav-link.active { background-color: #eff6ff; color: #2563eb; border-right: 4px solid #2563eb; }
        #user-dropdown { transition: all 0.2s ease; }

        @keyframes fadeIn   { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes slideUp  { from { opacity: 0; transform: translateY(25px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes slideDown{ from { opacity: 0; transform: translateY(-25px); } to { opacity: 1; transform: translateY(0); } }

        .animate-fade-in   { animation: fadeIn 0.3s ease-out forwards; }
        .animate-slide-up  { opacity: 0; animation: slideUp 0.6s ease forwards; }
        .animate-slide-down{ animation: slideDown 0.6s ease forwards; }

        /* Chat scrollbar */
        .chat-scroll::-webkit-scrollbar { width: 5px; }
        .chat-scroll::-webkit-scrollbar-track { background: #f1f1f1; }
        .chat-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body>
<div class="app-container">

    <!-- TOP HEADER -->
    <header class="fixed top-0 left-64 right-0 h-16 bg-white border-b border-gray-200 z-20">
        <div class="h-full px-8 flex items-center justify-between">
            <h2 class="text-xl font-semibold text-gray-900" id="header-title">Accueil</h2>
            <div class="relative">
                <button id="user-menu-button" class="flex items-center gap-3 px-3 py-2 hover:bg-gray-100 rounded-lg transition-colors">
                    <img id="user-avatar" src="https://ui-avatars.com/api/?name=Teacher&background=0D9488&color=fff&size=40" class="w-8 h-8 rounded-full">
                    <div class="text-left hidden md:block">
                        <p id="user-name" class="text-sm font-medium text-gray-900">Enseignant</p>
                        <p class="text-xs text-gray-500">Enseignant</p>
                    </div>
                </button>
                <div id="user-dropdown" class="absolute right-0 mt-2 w-48 bg-white border border-gray-200 rounded-xl shadow-lg hidden z-50 overflow-hidden">
                    <button onclick="logout()" class="w-full px-4 py-3 text-sm text-red-600 hover:bg-red-50 flex items-center gap-2">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
                        <span>Déconnexion</span>
                    </button>
                </div>
            </div>
        </div>
    </header>

    <!-- SIDEBAR -->
    <aside class="fixed left-0 top-0 h-screen w-64 bg-white border-r border-gray-200 flex flex-col z-30">
        <div class="p-6 border-b border-gray-200">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-blue-600 rounded-lg flex items-center justify-center text-white">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 14l9-5-9-5-9 5 9 5z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 14l6.16-3.422a12.083 12.083 0 01.665 6.479A11.952 11.952 0 0012 20.055a11.952 11.952 0 00-6.824-2.998 12.078 12.078 0 01.665-6.479L12 14z"/></svg>
                </div>
                <div>
                    <h1 class="font-semibold text-gray-900 leading-tight">ENT Université</h1>
                    <p class="text-xs text-gray-500">Espace Enseignant</p>
                </div>
            </div>
        </div>
        <nav class="flex-1 p-4">
            <ul class="space-y-1" id="sidebar-nav">
                <li><button onclick="router('accueil')" class="nav-btn w-full flex items-center gap-3 px-4 py-3 rounded-lg text-gray-700 hover:bg-gray-50" id="btn-accueil">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
                    <span class="font-medium">Accueil</span>
                </button></li>
                <li><button onclick="router('calendar')" class="nav-btn w-full flex items-center gap-3 px-4 py-3 rounded-lg text-gray-700 hover:bg-gray-50" id="btn-calendar">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 4h10M4 12h16m-6 4l-6 6m6-6l6 6"/></svg>
                    <span class="font-medium">Calendrier</span>
                </button></li>
                <li><button onclick="router('courses')" class="nav-btn w-full flex items-center gap-3 px-4 py-3 rounded-lg text-gray-700 hover:bg-gray-50" id="btn-courses">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/></svg>
                    <span class="font-medium">Mes Cours</span>
                </button></li>
                <li><button onclick="router('assignments')" class="nav-btn w-full flex items-center gap-3 px-4 py-3 rounded-lg text-gray-700 hover:bg-gray-50" id="btn-assignments">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
                    <span class="font-medium">Devoirs</span>
                </button></li>
                <li><button onclick="router('chatbot')" class="nav-btn w-full flex items-center gap-3 px-4 py-3 rounded-lg text-gray-700 hover:bg-gray-50" id="btn-chatbot">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
                    <span class="font-medium">Assistant IA</span>
                </button></li>
            </ul>
        </nav>
        <div class="p-4 border-t border-gray-200 text-center text-xs text-gray-400">© 2026 ENT Université</div>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="content-area">
        <div id="main-content" class="p-8 animate-fade-in"></div>
    </main>
</div>

<!-- ===================== PAGE TEMPLATES ===================== -->
    <!-- Accueil -->

<template id="page-accueil">
<div class="max-w-7xl mx-auto space-y-8 animate-fade-in">
    <div class="flex justify-between items-center animate-slide-down">
        <div>
            <h1 class="text-3xl font-bold text-gray-900 bg-gradient-to-r from-blue-600 to-purple-600 bg-clip-text text-transparent">Dashboard Enseignant</h1>
            <p class="text-gray-600 mt-1">Bienvenue, Thomas. Voici un aperçu de votre activité.</p>
        </div>
        <div class="bg-white px-4 py-2 rounded-lg shadow-sm border border-gray-200 text-gray-700 font-medium flex items-center gap-2">
            <svg class="w-5 h-5 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
            <span class="current-date-span"></span>
        </div>
    </div>
    <div class="grid grid-cols-1 md:grid-cols-4 gap-6">
        <div class="group bg-white p-6 rounded-xl border border-gray-200 shadow-sm hover:shadow-lg transition-all duration-300 hover:-translate-y-1 animate-slide-up" style="animation-delay:100ms">
            <div class="flex items-start justify-between mb-3">
                <div class="p-2 bg-blue-50 rounded-lg group-hover:bg-blue-100 transition-colors">
                    <svg class="w-6 h-6 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/></svg>
                </div>
                
            </div>
            <p class="text-sm text-gray-500 mb-1">Cours actifs</p>
            <p id="stats-courses" class="text-3xl font-bold text-gray-900">0</p>
        </div>
        <div class="group bg-white p-6 rounded-xl border border-gray-200 shadow-sm hover:shadow-lg transition-all duration-300 hover:-translate-y-1 animate-slide-up" style="animation-delay:200ms">
            <div class="flex items-start justify-between mb-3">
                <div class="p-2 bg-green-50 rounded-lg group-hover:bg-green-100 transition-colors">
                    <svg class="w-6 h-6 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"/></svg>
                </div>
            </div>
            <p class="text-sm text-gray-500 mb-1">Étudiants</p>
            <p id="stats-students" class="text-3xl font-bold text-gray-900">0</p>
           
        </div>
        <div class="group bg-white p-6 rounded-xl border border-gray-200 shadow-sm hover:shadow-lg transition-all duration-300 hover:-translate-y-1 animate-slide-up" style="animation-delay:300ms">
            <div class="flex items-start justify-between mb-3">
                <div class="p-2 bg-purple-50 rounded-lg group-hover:bg-purple-100 transition-colors">
                    <svg class="w-6 h-6 text-purple-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
                </div>
            </div>
            <p class="text-sm text-gray-500 mb-1">Ressources</p>
            <p id="stats-resources" class="text-3xl font-bold text-gray-900">0</p>
        </div>
    </div>
</div>
</template>

    <!-- courses -->

<template id="page-courses">
<div class="max-w-7xl mx-auto space-y-8 animate-fade-in">
    <div class="flex justify-between items-center animate-slide-down">
        <h1 class="text-4xl font-extrabold bg-gradient-to-r from-blue-600 via-purple-600 to-indigo-600 bg-clip-text text-transparent">Mes Cours</h1>
        <button onclick="openCourseModal()" class="bg-blue-600 text-white px-6 py-2 rounded-lg hover:bg-blue-700 font-medium transition-colors">+ Ajouter un cours</button>
    </div>
    <div id="courses-list" class="grid grid-cols-1 md:grid-cols-3 gap-6">
        <!-- Courses will be populated dynamically by JavaScript -->
    </div>
</div>
</template>

    <!-- assignments -->
<template id="page-assignments">
<div class="min-h-full">
<div class="max-w-7xl mx-auto px-6 py-8 space-y-8 animate-fade-in">

    <!-- Header -->
    <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 animate-slide-down">
        <div>
            <h1 class="text-4xl font-extrabold bg-gradient-to-r from-blue-600 via-purple-600 to-indigo-600 bg-clip-text text-transparent">Gestion des devoirs</h1>
        </div>
        <button onclick="openAssignmentModal()" class="flex items-center gap-2 bg-white/80 backdrop-blur-md px-5 py-2.5 rounded-2xl shadow-sm border border-white/60 hover:shadow-md transition-all font-semibold text-gray-700">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
            Nouveau devoir
        </button>
    </div>

    <!-- Stats cards — FIXED: was grid-cols-4 with only 3 items, now grid-cols-3 -->
    <div class="grid grid-cols-1 sm:grid-cols-3 gap-6">
        <div class="group relative overflow-hidden backdrop-blur-xl bg-white/40 rounded-3xl border border-white/60 shadow-lg p-6 animate-slide-up" style="animation-delay:100ms">
            <div class="absolute -right-4 -top-4 w-24 h-24 bg-blue-500/10 rounded-full blur-2xl group-hover:bg-blue-500/20 transition-colors"></div>
            <div class="p-3 bg-blue-500/10 rounded-2xl w-fit mb-4 border border-blue-200/50">
                <svg class="w-6 h-6 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
            </div>
            <p class="text-sm font-semibold text-gray-500 uppercase tracking-wider">Total devoirs</p>
            <p id="stats-assignments" class="text-4xl font-black text-gray-900 mt-1">0</p>
        </div>
        <div class="group relative overflow-hidden backdrop-blur-xl bg-white/40 rounded-3xl border border-white/60 shadow-lg p-6 animate-slide-up" style="animation-delay:200ms">
            <div class="absolute -right-4 -top-4 w-24 h-24 bg-green-500/10 rounded-full blur-2xl group-hover:bg-green-500/20 transition-colors"></div>
            <div class="p-3 bg-green-500/10 rounded-2xl w-fit mb-4 border border-green-200/50">
                <svg class="w-6 h-6 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
            </div>
            <p class="text-sm font-semibold text-gray-500 uppercase tracking-wider">Soumissions</p>
            <p id="stats-submissions" class="text-4xl font-black text-gray-900 mt-1">0</p>
        </div>
        <div class="group relative overflow-hidden backdrop-blur-xl bg-white/40 rounded-3xl border border-white/60 shadow-lg p-6 animate-slide-up" style="animation-delay:300ms">
            <div class="absolute -right-4 -top-4 w-24 h-24 bg-purple-500/10 rounded-full blur-2xl group-hover:bg-purple-500/20 transition-colors"></div>
            <div class="p-3 bg-purple-500/10 rounded-2xl w-fit mb-4 border border-purple-200/50">
                <svg class="w-6 h-6 text-purple-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 3.055A9.001 9.001 0 1020.945 13H11V3.055z"/></svg>
            </div>
            <p class="text-sm font-semibold text-gray-500 uppercase tracking-wider">Complétion</p>
            <p id="stats-completion" class="text-4xl font-black text-purple-600 mt-1">0%</p>
        </div>
    </div>

    <!-- Filter bar -->
    <div class="backdrop-blur-xl bg-white/60 rounded-2xl p-4 border border-white/60 shadow-xl animate-slide-up flex flex-col md:flex-row gap-4 justify-between" style="animation-delay:400ms">
        <div class="flex flex-wrap items-center gap-4 flex-1">
            <div class="relative flex-1 max-w-sm">
                <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-400">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
                </span>
                <input type="text" placeholder="Rechercher un devoir..." class="w-full bg-white/50 border border-white/60 rounded-xl py-2.5 pl-10 pr-4 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500/40 transition-all">
            </div>
            <div class="relative">
                <select class="appearance-none bg-white/50 text-sm font-bold text-gray-700 border border-white/60 rounded-xl px-4 py-2.5 pr-10 cursor-pointer focus:outline-none focus:ring-2 focus:ring-blue-500/40">
                    <option>Toutes les filières</option>
                    <option>Informatique</option>
                    <option>Mathématiques</option>
                </select>
                <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-3 text-gray-500">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
                </div>
            </div>
        </div>
        <button class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2.5 rounded-xl font-bold text-sm shadow-lg shadow-blue-200 transition-all active:scale-95">Appliquer les filtres</button>
    </div>

    <!-- ASSIGNMENTS LIST — FIXED: was missing wrapper causing layout collapse -->
    <div class="backdrop-blur-xl bg-white/40 rounded-3xl border border-white/60 shadow-2xl overflow-hidden animate-slide-up" style="animation-delay:500ms">
        <div class="bg-white/20 px-6 py-4 border-b border-white/40">
            <h3 class="font-bold text-gray-700 flex items-center gap-2">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h7"/></svg>
                Devoirs en cours
            </h3>
        </div>

        <div id="assignments-list" class="divide-y divide-white/40">
            <!-- Assignments will be populated dynamically by JavaScript -->
        </div>
    </div>

</div>
</div>
</template>
<!-- calendar -->
<template id="page-calendar">
<div class="max-w-7xl mx-auto px-6 py-8 space-y-8 animate-fade-in">
    
    <!-- Header with date and add button -->
    <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 animate-slide-down">
        <div>
            <h1 class="text-4xl font-extrabold bg-gradient-to-r from-blue-600 via-purple-600 to-indigo-600 bg-clip-text text-transparent">Planning & Événements</h1>
            <p class="text-gray-600 mt-1">Gérez vos cours, examens, TP et TD</p>
        </div>
        <div class="flex items-center gap-3">
            
            <button onclick="openEventModal()" class="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2.5 rounded-xl font-medium text-sm shadow-lg shadow-blue-200 transition-all active:scale-95 flex items-center gap-2">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
                Nouvel événement
            </button>
        </div>
    </div>

    <!-- Calendar Navigation -->
    <div class="flex items-center justify-between bg-white/80 backdrop-blur-xl rounded-2xl p-4 border border-gray-200 shadow-lg animate-slide-up" style="animation-delay:100ms">
        <div class="flex items-center gap-2">
            <button class="p-2 hover:bg-gray-100 rounded-lg transition-colors">
                <svg class="w-5 h-5 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
            </button>
            <h2 class="text-xl font-bold text-gray-800 min-w-[200px] text-center">Mars 2026</h2>
            <button class="p-2 hover:bg-gray-100 rounded-lg transition-colors">
                <svg class="w-5 h-5 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
            </button>
        </div>
        <div class="flex gap-2">
            <button class="px-4 py-2 text-sm font-medium text-gray-600 hover:bg-gray-100 rounded-lg transition-colors">Aujourd'hui</button>
            <select class="px-3 py-2 border border-gray-200 rounded-lg text-sm font-medium text-gray-600 bg-white">
                <option>Mois</option>
                <option>Semaine</option>
                <option>Jour</option>
            </select>
        </div>
    </div>

    <!-- Legend / Filters -->
    <div class="flex flex-wrap items-center gap-4 bg-white/40 backdrop-blur-xl rounded-xl p-4 border border-white/60 animate-slide-up" style="animation-delay:150ms">
        <span class="text-sm font-medium text-gray-600">Filtres:</span>
        <button class="px-3 py-1.5 rounded-lg text-sm font-medium bg-blue-100 text-blue-700 border border-blue-200 flex items-center gap-1">
            <span class="w-2 h-2 rounded-full bg-blue-500"></span> Cours
        </button>
        <button class="px-3 py-1.5 rounded-lg text-sm font-medium bg-red-100 text-red-700 border border-red-200 flex items-center gap-1">
            <span class="w-2 h-2 rounded-full bg-red-500"></span> Examens
        </button>
        <button class="px-3 py-1.5 rounded-lg text-sm font-medium bg-green-100 text-green-700 border border-green-200 flex items-center gap-1">
            <span class="w-2 h-2 rounded-full bg-green-500"></span> TP
        </button>
        <button class="px-3 py-1.5 rounded-lg text-sm font-medium bg-purple-100 text-purple-700 border border-purple-200 flex items-center gap-1">
            <span class="w-2 h-2 rounded-full bg-purple-500"></span> TD
        </button>

<!-- ===================== SCRIPTS ===================== -->
<script>
const contentDiv = document.getElementById('main-content');
const headerTitle = document.getElementById('header-title');

const pageTitles = { accueil:'Accueil', courses:'Mes Cours', assignments:'Devoirs', chatbot:'Assistant IA' };

function router(pageId) {
    // Load from inline <template> instead of fetch() — fixes the file:// issue
    const tmpl = document.getElementById('page-' + pageId);
    if (!tmpl) {
        contentDiv.innerHTML = '<div class="text-center text-red-500 mt-20">Page introuvable.</div>';
        return;
    }

    // Inject content
    contentDiv.innerHTML = '';
    contentDiv.appendChild(tmpl.content.cloneNode(true));

    // Update header
    headerTitle.textContent = pageTitles[pageId] || pageId;

    // Update sidebar highlight
    document.querySelectorAll('.nav-btn').forEach(btn => {
        btn.classList.remove('bg-blue-50', 'text-blue-600');
        btn.classList.add('text-gray-700');
    });
    const activeBtn = document.getElementById('btn-' + pageId);
    if (activeBtn) {
        activeBtn.classList.remove('text-gray-700');
        activeBtn.classList.add('bg-blue-50', 'text-blue-600');
    }

    // Page-specific logic
    if (pageId === 'accueil') {
        const dateSpans = document.querySelectorAll('.current-date-span');
        const today = new Date().toLocaleDateString('fr-FR', { day:'numeric', month:'long', year:'numeric' });
        dateSpans.forEach(s => s.textContent = today);
        
        // Reload stats when returning to home
        loadTeacherStats();
    }
    
    if (pageId === 'courses') {
        // Load courses when navigating to courses page
        loadTeacherStats();
    }
    
    if (pageId === 'calendar') {
        // Initialize event form when calendar page is loaded
        setTimeout(() => {
            initEventForm();
        }, 100);
    }
}

// Chat with API integration
async function sendChat() {
    const input = document.getElementById('chat-input');
    const msgs = document.getElementById('chat-messages');
    
    if (!input || !msgs) return;
    
    const question = input.value.trim();
    if (!question) return;

    // User bubble
    msgs.innerHTML += `
        <div class="flex gap-3 justify-end">
            <div class="bg-blue-600 text-white p-3 rounded-2xl text-sm max-w-[80%]">${escapeHtml(question)}</div>
            <div class="w-8 h-8 rounded-full bg-teal-600 flex items-center justify-center text-white text-xs font-bold flex-shrink-0">${user.username.charAt(0).toUpperCase()}</div>
        </div>
    `;
    
    input.value = '';
    msgs.scrollTop = msgs.scrollHeight;

    // Show loading
    const loadingId = 'loading-' + Date.now();
    msgs.innerHTML += `
        <div id="${loadingId}" class="flex gap-3">
            <div class="w-8 h-8 rounded-full bg-blue-600 flex items-center justify-center text-white text-xs font-bold flex-shrink-0">AI</div>
            <div class="bg-gray-100 p-3 rounded-2xl text-sm">
                <div class="flex gap-1">
                    <div class="w-2 h-2 bg-gray-400 rounded-full animate-bounce"></div>
                    <div class="w-2 h-2 bg-gray-400 rounded-full animate-bounce" style="animation-delay: 0.1s"></div>
                    <div class="w-2 h-2 bg-gray-400 rounded-full animate-bounce" style="animation-delay: 0.2s"></div>
                </div>
            </div>
        </div>
    `;
    msgs.scrollTop = msgs.scrollHeight;

    try {
        const response = await ChatbotAPI.chat(question);
        
        document.getElementById(loadingId)?.remove();
        
        msgs.innerHTML += `
            <div class="flex gap-3">
                <div class="w-8 h-8 rounded-full bg-blue-600 flex items-center justify-center text-white text-xs font-bold flex-shrink-0">AI</div>
                <div class="bg-gray-100 p-3 rounded-2xl text-sm max-w-[80%]">${escapeHtml(response.answer)}</div>
            </div>
        `;
    } catch (error) {
        document.getElementById(loadingId)?.remove();
        
        const errorMsg = error.message || error.detail || JSON.stringify(error) || 'Erreur inconnue';
        msgs.innerHTML += `
            <div class="flex gap-3">
                <div class="w-8 h-8 rounded-full bg-red-600 flex items-center justify-center text-white text-xs font-bold flex-shrink-0">!</div>
                <div class="bg-red-50 text-red-700 p-3 rounded-2xl text-sm max-w-[80%]">Erreur: ${escapeHtml(errorMsg)}</div>
            </div>
        `;
    }
    
    msgs.scrollTop = msgs.scrollHeight;
}

function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

document.addEventListener('keydown', e => {
    const input = document.getElementById('chat-input');
    if (input && e.key === 'Enter') sendChat();
});

// Dropdown
const userButton = document.getElementById('user-menu-button');
const dropdown = document.getElementById('user-dropdown');
userButton.addEventListener('click', e => { e.stopPropagation(); dropdown.classList.toggle('hidden'); });
document.addEventListener('click', e => {
    if (!dropdown.contains(e.target) && !userButton.contains(e.target)) dropdown.classList.add('hidden');
});

// Check authentication
if (!Auth.isAuthenticated()) {
    window.location.href = '/login/index.html';
}

const user = Auth.getUser();
if (user.role !== 'teacher') {
    showToast('Accès refusé. Cette page est réservée aux enseignants.', 'error');
    setTimeout(() => {
        Auth.logout();
        window.location.href = '/login/index.html';
    }, 2000);
}

// Update user info in header
document.addEventListener('DOMContentLoaded', () => {
    const displayName = user.full_name || user.username;
    document.getElementById('user-name').textContent = displayName;
    document.getElementById('user-avatar').src = `https://ui-avatars.com/api/?name=${encodeURIComponent(displayName)}&background=0D9488&color=fff&size=40`;
    
    // Initialize teacher dashboard
    initTeacherDashboard();
    
    // Initialize event form after router loads the page
    setTimeout(() => {
        initEventForm();
    }, 500);
});

function logout() {
    showConfirm('Voulez-vous vraiment vous déconnecter ?', () => {
        Auth.logout();
    });
}
// Calendar functions
function openEventModal() {
    document.getElementById('event-modal').classList.remove('hidden');
}

function closeEventModal() {
    document.getElementById('event-modal').classList.add('hidden');
}

// Course modal functions
function openCourseModal() {
    document.getElementById('course-modal').classList.remove('hidden');
    // Initialize form when modal opens
    setTimeout(() => {
        initCourseForm();
    }, 100);
}

function closeCourseModal() {
    document.getElementById('course-modal').classList.add('hidden');
}

// Assignment modal functions
function openAssignmentModal() {
    document.getElementById('assignment-modal').classList.remove('hidden');
    // Initialize form when modal opens
    setTimeout(() => {
        initAssignmentForm();
    }, 100);
}

function closeAssignmentModal() {
    document.getElementById('assignment-modal').classList.add('hidden');
}

function viewEvent(eventId) {
    showToast('Voir détails de l\'événement #' + eventId, 'info');
    // You can implement a detailed view modal here
}

// Add click outside to close modal
document.addEventListener('click', function(e) {
    const modal = document.getElementById('event-modal');
    if (modal && !modal.classList.contains('hidden')) {
        if (e.target.classList.contains('fixed') && e.target.classList.contains('bg-black/50')) {
            closeEventModal();
        }
    }
});

// Prevent modal close when clicking inside
document.getElementById('event-modal')?.addEventListener('click', function(e) {
    e.stopPropagation();
});

// Update date in calendar header
const dateSpan = document.querySelector('.current-date-calendar');
if (dateSpan) {
    const today = new Date().toLocaleDateString('fr-FR', { day:'numeric', month:'long', year:'numeric' });
    dateSpan.textContent = today;
}

// Functions to load dynamic data
async function loadCourses() {
    try {
        const response = await fetch('http://localhost:8002/courses', {
            headers: Auth.getAuthHeader()
        });
        
        if (response.ok) {
            const courses = await response.json();
            console.log('Cours chargés:', courses);
            // Update courses display here
        }
    } catch (error) {
        console.error('Erreur lors du chargement des cours:', error);
    }
}

async function loadStudents() {
    try {
        const response = await fetch('http://localhost:8001/all-users');
        
        if (response.ok) {
            const allUsers = await response.json();
            const students = allUsers.filter(u => u.role === 'student');
            console.log('Étudiants chargés:', students.length);
            // Update students display here
        }
    } catch (error) {
        console.error('Erreur lors du chargement des étudiants:', error);
    }
}

async function loadResources() {
    try {
        const response = await fetch('http://localhost:8002/courses', {
            headers: Auth.getAuthHeader()
        });
        
        if (response.ok) {
            const resources = await response.json();
            console.log('Ressources chargées:', resources);
            // Update resources display here
        }
    } catch (error) {
        console.error('Erreur lors du chargement des ressources:', error);
    }
}

// Start on home
window.onload = () => router('accueil');
</script>
