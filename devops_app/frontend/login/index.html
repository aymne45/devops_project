<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Heroicons -->
  <script src="https://unpkg.com/heroicons@2.0.16/dist/heroicons.min.js"></script>
</head>

<body class="bg-gradient-to-br from-teal-400 via-cyan-400 to-blue-500 flex items-center justify-center min-h-screen p-4">

    
<!-- Background decoration -->
<div class="absolute inset-0 bg-black opacity-10 backdrop-blur-3xl"></div>
<div class="absolute top-0 left-0 w-40 h-40 bg-white rounded-full filter blur-3xl opacity-20 animate-pulse"></div>
<div class="absolute bottom-0 right-0 w-60 h-60 bg-yellow-300 rounded-full filter blur-3xl opacity-20 animate-pulse"></div>

<!-- Main Card -->
<div class="bg-white/90 backdrop-blur-md p-10 rounded-3xl shadow-2xl w-full max-w-md relative z-10 border border-white/20">

    <!-- Logo -->
<div class="flex justify-center mb-6">
    <div class="hover:scale-110 transition duration-500 cursor-pointer">
        <img src="../img/logo.png" alt="est sale"
             class="w-35 h-25 object-contain">
    </div>
</div>

    <!-- Email Input -->
    <div class="mb-5">
        <label class="block text-sm font-medium text-gray-700 mb-2 ml-1">Email</label>
        <div class="relative group">
            <span class="absolute inset-y-0 left-0 flex items-center pl-4 text-gray-500 group-focus-within:text-indigo-500 transition duration-200">
                <!-- Envelope Icon -->
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor" class="w-5 h-5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M21.75 6.75v10.5a2.25 2.25 0 01-2.25 2.25h-15a2.25 2.25 0 01-2.25-2.25V6.75m19.5 0A2.25 2.25 0 0019.5 4.5h-15a2.25 2.25 0 00-2.25 2.25m19.5 0v.243a2.25 2.25 0 01-1.07 1.916l-7.5 4.615a2.25 2.25 0 01-2.36 0L3.32 8.91a2.25 2.25 0 01-1.07-1.916V6.75" />
                </svg>
            </span>
            <input id="email" type="email" placeholder="votre@um5.ac.ma"
                class="w-full pl-12 pr-4 py-3.5 bg-gray-50 border-2 border-gray-200 rounded-xl 
                       focus:outline-none focus:border-indigo-500 focus:bg-white 
                       transition duration-200 text-gray-700 placeholder-gray-400">
        </div>
    </div>

    <!-- Password Input -->
<div class="mb-6">
    <div class="flex justify-between items-center mb-2">
        <label class="block text-sm font-medium text-gray-700 ml-1">Mot de passe</label>
        <a href="#" class="text-sm text-indigo-600 hover:text-indigo-800 font-medium transition duration-200">Mot de passe oublié?</a>
    </div>
    <div class="relative group">
        <span class="absolute inset-y-0 left-0 flex items-center pl-4 text-gray-500 group-focus-within:text-indigo-500 transition duration-200">
            <!-- Lock Icon -->
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor" class="w-5 h-5">
                <path stroke-linecap="round" stroke-linejoin="round" d="M16.5 10.5V6.75a4.5 4.5 0 10-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 002.25-2.25v-6.75a2.25 2.25 0 00-2.25-2.25H6.75a2.25 2.25 0 00-2.25 2.25v6.75a2.25 2.25 0 002.25 2.25z" />
            </svg>
        </span>
        <input id="password" type="password"
            class="w-full pl-12 pr-12 py-3.5 bg-gray-50 border-2 border-gray-200 rounded-xl 
                   focus:outline-none focus:border-indigo-500 focus:bg-white
                   transition duration-200 text-gray-700 placeholder-gray-400"
            placeholder="••••••••">
        <!-- Show/Hide password button -->
        <button type="button" id="togglePassword" 
                class="absolute inset-y-0 right-0 flex items-center pr-4 text-gray-500 hover:text-indigo-600 transition duration-200">
            <!-- Eye Icon (Visible) -->
            <svg id="eyeIcon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor" class="w-5 h-5">
                <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z" />
                <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
            </svg>
            <!-- Eye Slash Icon (Hidden) - Initially hidden -->
            <svg id="eyeSlashIcon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor" class="w-5 h-5 hidden">
                <path stroke-linecap="round" stroke-linejoin="round" d="M3.98 8.223A10.477 10.477 0 001.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.45 10.45 0 0112 4.5c4.756 0 8.773 3.162 10.065 7.498a10.523 10.523 0 01-4.293 5.774M6.228 6.228L3 3m3.228 3.228l3.65 3.65m7.894 7.894L21 21m-3.228-3.228l-3.65-3.65m0 0a3 3 0 10-4.243-4.243m4.242 4.242L9.88 9.88" />
            </svg>
        </button>
    </div>
</div>

    <!-- Button -->
<button 
    class="w-full bg-gradient-to-r from-green-600 to-blue-600 text-white font-bold py-3.5 rounded-xl 
           hover:from-green-700 hover:to-blue-700 active:from-green-800 active:to-blue-800
           transform hover:scale-[1.02] transition duration-200 shadow-lg shadow-green-600/30">
    Se connecter
</button>

    

    <!-- Sign up link -->
    <p class="text-center mt-6 text-sm text-gray-600">
        Pas encore de compte? 
            <a href="https://etu.um5.ac.ma/index.php?:nav=comptes::index"
            target="_blank"
            rel="noopener noreferrer"
            class="font-semibold text-indigo-600 hover:text-indigo-800 transition duration-200">
            Recuperer votre compte
            </a>
    </p>

</div>
        <script>
            // Toggle password visibility
            const togglePassword = document.getElementById('togglePassword');
            const passwordInput = document.getElementById('password');
            const eyeIcon = document.getElementById('eyeIcon');
            const eyeSlashIcon = document.getElementById('eyeSlashIcon');

            togglePassword.addEventListener('click', function() {
                // Toggle password type
                const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
                passwordInput.setAttribute('type', type);
                
                // Toggle icons
                eyeIcon.classList.toggle('hidden');
                eyeSlashIcon.classList.toggle('hidden');
                
                // Optional: Add focus to input after toggling
                passwordInput.focus();
            });
        </script>
</body>
</html>
