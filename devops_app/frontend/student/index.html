<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Portail Étudiant - ENT EST Salé</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .active-link { background: rgba(255, 255, 255, 0.2); border-left: 4px solid white; }
        .content-fade { animation: fadeIn 0.4s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-gray-50 text-gray-800">

<div class="flex">
    <nav class="w-64 bg-gradient-to-br from-teal-500 via-cyan-500 to-blue-600 text-white h-screen fixed left-0 top-0 p-6 shadow-xl flex flex-col rounded-br-[30px] z-50">
        <div class="flex flex-col items-center mb-10 text-center">
            <h2 class="text-2xl font-bold flex items-center">
                <span class="mr-2">🎓</span> ENT-Student
            </h2>
        </div>

        <div class="space-y-4 flex-1">
            <button onclick="loadSection('accueil.html', 'Bonjour, Anas ! 👋', this)" class="nav-item flex items-center w-full px-4 py-3 rounded-xl hover:bg-white/10 transition">
                <span class="mr-3">🏠</span> Accueil
            </button>
            <button onclick="loadSection('notes.html', 'Mes Notes 📝', this)" class="nav-item flex items-center w-full px-4 py-3 rounded-xl hover:bg-white/10 transition">
                <span class="mr-3">📝</span> Mes Notes
            </button>
            <button onclick="loadSection('examens.html', 'Calendrier des Examens 📅', this)" class="nav-item flex items-center w-full px-4 py-3 rounded-xl hover:bg-white/10 transition">
                <span class="mr-3">📅</span> Examens
            </button>
        </div>

        <div class="mt-auto pt-6 border-t border-white/20 flex items-center justify-between">
            <div class="flex items-center space-x-3">
                <div class="h-10 w-10 rounded-full bg-white text-teal-600 flex items-center justify-center font-bold">
                    AA
                </div>
                <p class="text-sm font-bold truncate w-24">Anas Alami</p>
            </div>
            <a href="../login/index.html" class="p-2 hover:bg-red-500/20 rounded-lg transition" title="Déconnexion">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
                </svg>
            </a>
        </div>
    </nav>

    <main class="ml-64 flex-1 p-10">
        <header class="mb-10">
            <h1 id="page-title" class="text-3xl font-bold text-gray-800">Chargement...</h1>
            <p id="page-subtitle" class="text-gray-500 mt-1">Espace Numérique de Travail - EST Salé</p>
        </header>

        <div id="dynamic-content" class="content-fade">
            </div>
    </main>
</div>

<script>
    async function loadSection(file, title, element) {
        document.getElementById('page-title').innerText = title;
        
        // Gestion du style actif sur les boutons
        document.querySelectorAll('.nav-item').forEach(btn => btn.classList.remove('active-link'));
        if(element) element.classList.add('active-link');

        try {
            const response = await fetch(file);
            const html = await response.text();
            const container = document.getElementById('dynamic-content');
            container.innerHTML = html;

            // Ré-initialiser les graphiques si on charge l'accueil
            if(file === 'accueil.html') {
                setTimeout(initGradeChart, 100);
            }
        } catch (err) {
            console.error("Erreur de chargement:", err);
        }
    }

    function initGradeChart() {
        const ctx = document.getElementById('studentChart');
        if(ctx) {
            new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: ['NoSQL', 'Web', 'Backend', 'UX/UI', 'Mobile'],
                    datasets: [{
                        label: 'Note / 20',
                        data: [17, 14.5, 15, 17, 13],
                        backgroundColor: '#14b8a6',
                        borderRadius: 8
                    }]
                },
                options: { responsive: true, plugins: { legend: { display: false } } }
            });
        }
    }

    // Charger l'accueil au démarrage
    window.onload = () => {
        const firstBtn = document.querySelector('.nav-item');
        loadSection('accueil.html', 'Bonjour, Anas ! 👋', firstBtn);
    };
</script>
</body>
</html>
