<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ENT EST · Espace Étudiant</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="../js/api.js"></script>
    <script src="../js/notifications.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #f8fafc; margin: 0; overflow-x: hidden; }
        .content-area { margin-left: 256px; padding-top: 64px; min-height: 100vh; transition: all 0.3s ease; }
        .nav-link.active { background-color: #f5f3ff; color: #4f46e5; border-right: 4px solid #4f46e5; }
        
        @keyframes fadeIn   { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes slideUp  { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in   { animation: fadeIn 0.3s ease-out forwards; }
        .animate-slide-up  { opacity: 0; animation: slideUp 0.5s ease forwards; }
    </style>
</head>
<body>

<div class="app-container">
    <header class="fixed top-0 left-64 right-0 h-16 bg-white border-b border-gray-200 z-20">
        <div class="h-full px-8 flex items-center justify-between">
            <h2 class="text-xl font-semibold text-gray-800" id="header-title">Accueil</h2>

                <button class="relative p-2 text-gray-400 hover:bg-gray-100 rounded-full">

                    <span class="absolute top-2 right-2 w-2 h-2 bg-red-500 rounded-full border-2 border-white"></span>
                </button>
                <div class="flex items-center gap-3 pl-4 border-l border-gray-200">
                    <img id="user-avatar" src="https://ui-avatars.com/api/?name=Student&background=4F46E5&color=fff" class="w-8 h-8 rounded-full">
                    <div class="text-left hidden md:block">
                        <p id="user-name" class="text-sm font-medium text-gray-900">Étudiant</p>
                        <p class="text-xs text-gray-500">Étudiant · L3 Info</p>
                    </div>
                    <button onclick="logout()" class="ml-3 px-3 py-1.5 bg-red-50 hover:bg-red-100 text-red-600 text-xs font-medium rounded-lg transition" title="Se déconnecter">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
                    </button>
                </div>
            </div>
        </div>
    </header>

    <aside class="fixed left-0 top-0 h-screen w-64 bg-white border-r border-gray-200 flex flex-col z-30">
        <div class="p-6 border-b border-gray-200">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-indigo-600 rounded-lg flex items-center justify-center text-white shadow-lg shadow-indigo-200">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M12 14l9-5-9-5-9 5 9 5z"/><path stroke-width="2" d="M12 14l6.16-3.422a12.083 12.083 0 01.665 6.479A11.952 11.952 0 0012 20.055a11.952 11.952 0 00-6.824-2.998 12.078 12.078 0 01.665-6.479L12 14z"/></svg>
                </div>

            </div>
        </div>
        <nav class="flex-1 p-4 space-y-1">
            <button onclick="router('accueil')" id="btn-accueil" class="nav-btn w-full flex items-center gap-3 px-4 py-3 rounded-xl text-gray-600 hover:bg-gray-50 transition-all font-medium">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
                Accueil
            </button>
            <button onclick="router('notes')" id="btn-notes" class="nav-btn w-full flex items-center gap-3 px-4 py-3 rounded-xl text-gray-600 hover:bg-gray-50 transition-all font-medium">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>
                Mes Notes
            </button>
            <button onclick="router('calendar')" id="btn-calendar" class="nav-btn w-full flex items-center gap-3 px-4 py-3 rounded-xl text-gray-600 hover:bg-gray-50 transition-all font-medium">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M8 7V3m8 4V3m-9 4h10M4 12h16m-6 4l-6 6m6-6l6 6"/></svg>
                Calendrier

            <button onclick="router('devoirs')" id="btn-devoirs" class="nav-btn w-full flex items-center gap-3 px-4 py-3 rounded-xl text-gray-600 hover:bg-gray-50 transition-all font-medium">

                Devoirs (TP/TD)
            </button>
             <button onclick="router('chatbot')" class="nav-btn w-full flex items-center gap-3 px-4 py-3 rounded-lg text-gray-700 hover:bg-gray-50" id="btn-chatbot">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
                    <span class="font-medium">Assistant IA</span>
                </button>
        </nav>
        <div class="p-4 border-t border-gray-100 text-xs text-center text-gray-400">Version 2.0.4 - 2026</div>
    </aside>

    <main class="content-area">
        <div id="main-content" class="p-8 animate-fade-in"></div>
    </main>
</div>

<template id="page-chatbot">
<div class="max-w-4xl mx-auto h-[calc(100vh-200px)] flex flex-col space-y-4 animate-fade-in">
    <div class="flex-1 bg-white rounded-xl border border-gray-200 shadow-sm flex flex-col overflow-hidden">
        <div class="bg-gray-50 p-4 border-b font-semibold text-gray-700 flex items-center gap-2">
            <div class="w-2 h-2 rounded-full bg-green-500"></div>
            Assistant IA ENT
        </div>
        <div class="flex-1 overflow-y-auto p-6 space-y-4 chat-scroll" id="chat-messages">
            <div class="flex gap-3">
                <div class="w-8 h-8 rounded-full bg-blue-600 flex items-center justify-center text-white text-xs font-bold flex-shrink-0">AI</div>
                <div class="bg-gray-100 p-3 rounded-2xl text-sm max-w-[80%]">Bonjour ! Comment puis-je vous aider aujourd'hui ? Posez-moi vos questions sur vos cours !</div>
            </div>
        </div>
        <div class="p-4 border-t bg-white">
            <div class="flex gap-2">
                <input type="text" id="chat-input" placeholder="Posez votre question..." class="flex-1 border rounded-lg px-4 py-2 outline-none focus:ring-2 focus:ring-blue-500 text-sm">
                <button onclick="sendChat()" class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700 font-medium transition-colors text-sm">Envoyer</button>
            </div>
        </div>
    </div>
</div>
</template>

<script>
    // Check authentication
    if (!Auth.isAuthenticated()) {
        window.location.href = '/login/index.html';
    }

    const user = Auth.getUser();
    if (user.role !== 'student') {
        showToast('Accès refusé. Cette page est réservée aux étudiants.', 'error');
        setTimeout(() => {
            Auth.logout();
            window.location.href = '/login/index.html';
        }, 2000);
    }

    // Update user info in header
    document.addEventListener('DOMContentLoaded', () => {
        const displayName = user.full_name || user.username;
        document.getElementById('user-name').textContent = displayName;
        document.getElementById('user-avatar').src = `https://ui-avatars.com/api/?name=${encodeURIComponent(displayName)}&background=4F46E5&color=fff`;
    });

    function logout() {
        showConfirm('Voulez-vous vraiment vous déconnecter ?', () => {
            Auth.logout();
        });
    }

    const contentDiv = document.getElementById('main-content');
    const headerTitle = document.getElementById('header-title');

    const titles = { 
        accueil: 'Tableau de bord', 
        notes: 'Mes Notes', 
        calendar: 'Emploi du temps', 
        devoirs: 'Travaux à rendre',
        chatbot: 'Assistant IA'
    };

    function router(pageId) {
        const tmpl = document.getElementById('page-' + pageId);
        if (!tmpl) return;

        contentDiv.innerHTML = '';
        contentDiv.appendChild(tmpl.content.cloneNode(true));
        headerTitle.textContent = titles[pageId];

        // Initialize chatbot if needed
        if (pageId === 'chatbot') {
            initChatbot();
        }

        // Highlight sidebar
        document.querySelectorAll('.nav-btn').forEach(btn => {
            btn.classList.remove('bg-indigo-50', 'text-indigo-600', 'shadow-sm');
            btn.classList.add('text-gray-600');
        });
        const activeBtn = document.getElementById('btn-' + pageId);
        if (activeBtn) {
            activeBtn.classList.remove('text-gray-600');
            activeBtn.classList.add('bg-indigo-50', 'text-indigo-600', 'shadow-sm');
        }
    }

    // Chatbot functions
    function initChatbot() {
        const chatInput = document.getElementById('chat-input');
        if (chatInput) {
            chatInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') sendChat();
            });
        }
    }

    async function sendChat() {
        const input = document.getElementById('chat-input');
        const messagesDiv = document.getElementById('chat-messages');
        
        if (!input || !messagesDiv) return;
        
        const question = input.value.trim();
        if (!question) return;

        // Add user message
        messagesDiv.innerHTML += `
            <div class="flex gap-3 justify-end">
                <div class="bg-blue-600 text-white p-3 rounded-2xl text-sm max-w-[80%]">${escapeHtml(question)}</div>
                <div class="w-8 h-8 rounded-full bg-indigo-600 flex items-center justify-center text-white text-xs font-bold flex-shrink-0">${user.username.charAt(0).toUpperCase()}</div>
            </div>
        `;
        
        input.value = '';
        messagesDiv.scrollTop = messagesDiv.scrollHeight;

        // Show loading
        const loadingId = 'loading-' + Date.now();
        messagesDiv.innerHTML += `
            <div id="${loadingId}" class="flex gap-3">
                <div class="w-8 h-8 rounded-full bg-blue-600 flex items-center justify-center text-white text-xs font-bold flex-shrink-0">AI</div>
                <div class="bg-gray-100 p-3 rounded-2xl text-sm">
                    <div class="flex gap-1">
                        <div class="w-2 h-2 bg-gray-400 rounded-full animate-bounce"></div>
                        <div class="w-2 h-2 bg-gray-400 rounded-full animate-bounce" style="animation-delay: 0.1s"></div>
                        <div class="w-2 h-2 bg-gray-400 rounded-full animate-bounce" style="animation-delay: 0.2s"></div>
                    </div>
                </div>
            </div>
        `;
        messagesDiv.scrollTop = messagesDiv.scrollHeight;

        try {
            const response = await ChatbotAPI.sendMessage(question);
            
            // Remove loading
            document.getElementById(loadingId)?.remove();
            
            // Add AI response
            messagesDiv.innerHTML += `
                <div class="flex gap-3">
                    <div class="w-8 h-8 rounded-full bg-blue-600 flex items-center justify-center text-white text-xs font-bold flex-shrink-0">AI</div>
                    <div class="bg-gray-100 p-3 rounded-2xl text-sm max-w-[80%]">${escapeHtml(response.answer)}</div>
                </div>
            `;
        } catch (error) {
            // Remove loading
            document.getElementById(loadingId)?.remove();
            
            // Show error
            messagesDiv.innerHTML += `
                <div class="flex gap-3">
                    <div class="w-8 h-8 rounded-full bg-red-600 flex items-center justify-center text-white text-xs font-bold flex-shrink-0">!</div>
                    <div class="bg-red-50 text-red-700 p-3 rounded-2xl text-sm max-w-[80%]">Erreur: ${escapeHtml(error.message)}</div>
                </div>
            `;
        }
        
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    // Function to submit homework
    function rendreDevoir(devoirName) {
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = '.pdf,.doc,.docx,.zip,.py,.java,.cpp,.c';
        
        input.onchange = async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            
            const formData = new FormData();
            formData.append('file', file);
            formData.append('assignment_name', devoirName);
            
            try {
                // Show loading
                const button = event.target;
                const originalText = button.textContent;
                button.disabled = true;
                button.textContent = 'Envoi...';
                button.classList.add('opacity-50', 'cursor-not-allowed');
                
                // Send file to API
                const response = await fetch(`${API_BASE_URL}/files/upload`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${Auth.getToken()}`
                    },
                    body: formData
                });
                
                if (!response.ok) {
                    throw new Error('Erreur lors de l\'envoi du fichier');
                }
                
                const result = await response.json();
                
                // Show success message
                showToast(`Devoir "${devoirName}" rendu avec succès! Fichier: ${file.name}`, 'success');
                
                // Reload the page to update the UI
                router('devoirs');
                
            } catch (error) {
                console.error('Error uploading file:', error);
                showToast('Erreur lors du rendu du devoir: ' + error.message, 'error');
                
                // Restore button
                if (event.target) {
                    event.target.disabled = false;
                    event.target.textContent = originalText;
                    event.target.classList.remove('opacity-50', 'cursor-not-allowed');
                }
            }
        };
        
        input.click();
    }

    // Chatbot function
    async function sendChat() {
        const input = document.getElementById('chat-input');
        const messagesDiv = document.getElementById('chat-messages');
        const question = input.value.trim();
        
        if (!question) return;
        
        // Add user message
        const userMsg = document.createElement('div');
        userMsg.className = 'flex gap-3 justify-end';
        userMsg.innerHTML = `
            <div class="bg-indigo-600 text-white p-3 rounded-2xl text-sm max-w-[80%]">${question}</div>
            <div class="w-8 h-8 rounded-full bg-indigo-600 flex items-center justify-center text-white text-xs font-bold flex-shrink-0">${user.username.charAt(0).toUpperCase()}</div>
        `;
        messagesDiv.appendChild(userMsg);
        
        input.value = '';
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
        
        // Add loading indicator
        const loadingMsg = document.createElement('div');
        loadingMsg.className = 'flex gap-3';
        loadingMsg.id = 'loading-msg';
        loadingMsg.innerHTML = `
            <div class="w-8 h-8 rounded-full bg-blue-600 flex items-center justify-center text-white text-xs font-bold flex-shrink-0">AI</div>
            <div class="bg-gray-100 p-3 rounded-2xl text-sm max-w-[80%]">
                <div class="flex gap-1">
                    <div class="w-2 h-2 bg-gray-400 rounded-full animate-bounce"></div>
                    <div class="w-2 h-2 bg-gray-400 rounded-full animate-bounce" style="animation-delay: 0.1s"></div>
                    <div class="w-2 h-2 bg-gray-400 rounded-full animate-bounce" style="animation-delay: 0.2s"></div>
                </div>
            </div>
        `;
        messagesDiv.appendChild(loadingMsg);
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
        
        try {
            // Send to API
            const response = await ChatbotAPI.chat(question);
            
            // Remove loading
            loadingMsg.remove();
            
            // Add AI response
            const aiMsg = document.createElement('div');
            aiMsg.className = 'flex gap-3';
            aiMsg.innerHTML = `
                <div class="w-8 h-8 rounded-full bg-blue-600 flex items-center justify-center text-white text-xs font-bold flex-shrink-0">AI</div>
                <div class="bg-gray-100 p-3 rounded-2xl text-sm max-w-[80%]">${response.answer || 'Désolé, je n\'ai pas pu traiter votre question.'}</div>
            `;
            messagesDiv.appendChild(aiMsg);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        } catch (error) {
            loadingMsg.remove();
            const errText = error.message || error.detail || JSON.stringify(error) || 'Erreur inconnue';
            const errorMsg = document.createElement('div');
            errorMsg.className = 'flex gap-3';
            errorMsg.innerHTML = `
                <div class="w-8 h-8 rounded-full bg-red-600 flex items-center justify-center text-white text-xs font-bold flex-shrink-0">!</div>
                <div class="bg-red-100 text-red-700 p-3 rounded-2xl text-sm max-w-[80%]">Erreur: ${errText}</div>
            `;
            messagesDiv.appendChild(errorMsg);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }
    }
    
    // Add Enter key support for chat
    document.addEventListener('keydown', (e) => {
        const input = document.getElementById('chat-input');
        if (input && e.key === 'Enter' && document.activeElement === input) {
            sendChat();
        }
    });

    // Init
    window.onload = () => router('accueil');
</script>

</body>
</html>
