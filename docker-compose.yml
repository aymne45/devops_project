services:
  # Cassandra Database
  cassandra:
    image: cassandra:4.1
    container_name: ent-cassandra
    ports:
      - "9042:9042"
    environment:
      - CASSANDRA_CLUSTER_NAME=ent-cluster
      - CASSANDRA_DC=dc1
      - CASSANDRA_ENDPOINT_SNITCH=GossipingPropertyFileSnitch
    volumes:
      - cassandra_data:/var/lib/cassandra
    networks:
      - ent-network
    healthcheck:
      test: ["CMD-SHELL", "cqlsh -e 'describe cluster'"]
      interval: 30s
      timeout: 10s
      retries: 5

  # MinIO Object Storage
  minio:
    image: minio/minio:latest
    container_name: ent-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    networks:
      - ent-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Ollama for AI (Llama 3)
  ollama:
    image: ollama/ollama:latest
    container_name: ent-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - ent-network
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Auth Service
  auth-service:
    build: ./microservices/auth-service
    container_name: ent-auth-service
    ports:
      - "8001:8001"
    environment:
      - CASSANDRA_HOST=cassandra
      - CASSANDRA_PORT=9042
      - SECRET_KEY=your-secret-key-change-in-production-123456789
    depends_on:
      cassandra:
        condition: service_healthy
    networks:
      - ent-network
    restart: unless-stopped

  # File Management Service
  file-management-service:
    build: ./microservices/file-management-service
    container_name: ent-file-management
    ports:
      - "8002:8002"
    environment:
      - CASSANDRA_HOST=cassandra
      - CASSANDRA_PORT=9042
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
      - AUTH_SERVICE_URL=http://auth-service:8001
    depends_on:
      - cassandra
      - minio
      - auth-service
    networks:
      - ent-network
    restart: unless-stopped

  # Download Service
  download-service:
    build: ./microservices/download-service
    container_name: ent-download-service
    ports:
      - "8003:8003"
    environment:
      - CASSANDRA_HOST=cassandra
      - CASSANDRA_PORT=9042
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
      - AUTH_SERVICE_URL=http://auth-service:8001
    depends_on:
      - cassandra
      - minio
      - auth-service
    networks:
      - ent-network
    restart: unless-stopped

  # Admin Service
  admin-service:
    build: ./microservices/admin-service
    container_name: ent-admin-service
    ports:
      - "8004:8004"
    environment:
      - CASSANDRA_HOST=cassandra
      - CASSANDRA_PORT=9042
      - AUTH_SERVICE_URL=http://auth-service:8001
    depends_on:
      - cassandra
      - auth-service
    networks:
      - ent-network
    restart: unless-stopped

  # Chatbot Service
  chatbot-service:
    build: ./microservices/chatbot-service
    container_name: ent-chatbot-service
    ports:
      - "8005:8005"
    environment:
      - CASSANDRA_HOST=cassandra
      - CASSANDRA_PORT=9042
      - OLLAMA_URL=http://ollama:11434
      - MODEL_NAME=llama3
      - AUTH_SERVICE_URL=http://auth-service:8001
    depends_on:
      cassandra:
        condition: service_healthy
      auth-service:
        condition: service_started
      ollama:
        condition: service_healthy
    networks:
      - ent-network
    restart: unless-stopped

  # Nginx API Gateway
  nginx:
    image: nginx:alpine
    container_name: ent-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./devops_app/frontend:/usr/share/nginx/html:ro
    depends_on:
      - auth-service
      - file-management-service
      - download-service
      - admin-service
      - chatbot-service
    networks:
      - ent-network
    restart: unless-stopped

networks:
  ent-network:
    driver: bridge

volumes:
  cassandra_data:
  minio_data:
  ollama_data:
